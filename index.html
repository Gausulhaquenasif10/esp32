<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHM Real-Time Navigator</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #111; }
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            color: white; border: 1px solid #444;
        }
        button {
            display: block; width: 100%; margin: 5px 0; padding: 12px;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
        .btn-connect { background: #00ff88; color: black; margin-bottom: 15px; }
        .btn-zone { background: #333; color: white; border: 1px solid #555; }
        #status {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,255,136,0.1); color: #00ff88;
            padding: 10px; border: 1px solid #00ff88; border-radius: 5px;
            text-align: center; font-family: monospace; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-size:12px; opacity:0.6; margin-bottom:5px;">SYSTEM STATUS</div>
    <button class="btn-connect" onclick="connectESP32()">SCAN FOR BEACON</button>
    <div style="font-size:12px; opacity:0.6; margin:10px 0 5px 0;">MANUAL OVERRIDE</div>
    <button class="btn-zone" onclick="setDestination('BLUE')">Blue Zone</button>
    <button class="btn-zone" onclick="setDestination('RED')">Red Zone</button>
</div>

<div id="status">READY: STANDING IN HINTZE HALL</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// --- 3D SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0a);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff, 1, 100);
light.position.set(0, 20, 10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

// --- MAP ELEMENTS ---
function createZone(x, z, color) {
    const geo = new THREE.BoxGeometry(16, 1, 16);
    const mat = new THREE.MeshStandardMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 0, z);
    scene.add(mesh);
    return mesh.position;
}

const zones = {
    HUB: new THREE.Vector3(0, 2, 0),
    BLUE: createZone(0, -30, 0x0066ff),
    RED: createZone(-30, 0, 0xff2200),
    GREEN: createZone(30, 0, 0x00ff66),
    ORANGE: createZone(0, 30, 0xff9900)
};

const user = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff })
);
user.position.y = 2;
scene.add(user);

let targetPos = zones.HUB;

// --- NAVIGATION ---
function setDestination(key) {
    if(zones[key]) {
        targetPos = zones[key].clone();
        targetPos.y = 2;
        document.getElementById("status").innerText = "LOCATION: " + key + " ZONE";
    }
}

// --- BLUEFY / BLUETOOTH LOGIC ---
async function connectESP32() {
    const statusDiv = document.getElementById("status");
    try {
        statusDiv.innerText = "OPENING SCANNER...";
        
        // requestDevice MUST be called directly by the button click
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "NHM_" }],
            optionalServices: ['battery_service', 0x180F] 
        });

        statusDiv.innerText = "CONNECTED TO: " + device.name;

        // Auto-move based on name
        const name = device.name.toUpperCase();
        if (name.includes("BLUE")) setDestination("BLUE");
        else if (name.includes("RED")) setDestination("RED");
        else if (name.includes("GREEN")) setDestination("GREEN");
        else if (name.includes("ORANGE")) setDestination("ORANGE");

    } catch (error) {
        statusDiv.innerText = "ERROR: " + error.message;
        // This alert is vital for debugging on mobile!
        alert("Bluetooth Error: " + error.message);
    }
}

// --- ANIMATION ---
function animate() {
    requestAnimationFrame(animate);
    user.position.lerp(targetPos, 0.05);
    camera.lookAt(user.position);
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
