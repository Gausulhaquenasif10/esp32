<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHM Real-Time Navigation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            border: 1px solid #444;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-connect { background: #00ff88; color: #000; }
        .btn-blue { background: #2b6cb0; color: white; }
        .btn-red { background: #c53030; color: white; }
        .btn-green { background: #2f855a; color: white; }
        .btn-orange { background: #c05621; color: white; }

        #status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #00ff88;
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid #00ff88;
            font-family: monospace;
            z-index: 100;
        }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="panel">
        <h3 style="margin-top:0">NHM Navigator</h3>
        <button class="btn-connect" onclick="connectESP32()">Connect to Local Beacon</button>
    </div>
    <div class="panel">
        <div style="margin-bottom:8px; font-size: 12px; opacity: 0.7;">MANUAL OVERRIDE</div>
        <button class="btn-blue" onclick="setDestination('BLUE')">Blue Zone</button>
        <button class="btn-red" onclick="setDestination('RED')">Red Zone</button>
        <button class="btn-green" onclick="setDestination('GREEN')">Green Zone</button>
        <button class="btn-orange" onclick="setDestination('ORANGE')">Orange Zone</button>
    </div>
</div>

<div id="status-bar">SYSTEM READY: STANDING IN HINTZE HALL</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
/**
 * 3D SCENE SETUP
 */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 20, 100);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 40);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xffffff, 1);
spotLight.position.set(0, 50, 0);
scene.add(spotLight);

/**
 * MUSEUM MAP ELEMENTS
 */
function createZone(x, z, color, label) {
    const group = new THREE.Group();
    
    // Floor Slab
    const geo = new THREE.BoxGeometry(15, 0.5, 15);
    const mat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    
    // Decorative "Walls"
    const frameGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(15, 4, 15));
    const frameMat = new THREE.LineBasicMaterial({ color: color });
    const frame = new THREE.LineSegments(frameGeo, frameMat);
    frame.position.y = 2;

    group.add(mesh);
    group.add(frame);
    group.position.set(x, 0, z);
    
    scene.add(group);
    return { group, position: new THREE.Vector3(x, 0, z) };
}

// Map Layout (National History Museum Inspired)
const zones = {
    HUB: createZone(0, 0, 0xaaaaaa, "Hintze Hall"),
    BLUE: createZone(0, -30, 0x0055ff, "Blue Zone (Mammals)"),
    GREEN: createZone(30, 0, 0x00ff55, "Green Zone (Birds)"),
    RED: createZone(-30, 0, 0xff3300, "Red Zone (Earth)"),
    ORANGE: createZone(0, 30, 0xffaa00, "Orange Zone (Garden)")
};

// User Pointer (The Navigator)
const userPointer = new THREE.Mesh(
    new THREE.ConeGeometry(1, 3, 4),
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff })
);
userPointer.position.y = 2;
userPointer.rotation.x = Math.PI;
scene.add(userPointer);

let targetPos = new THREE.Vector3(0, 2, 0);
let pathLine = null;

/**
 * NAVIGATION LOGIC
 */
function setDestination(key) {
    const dest = zones[key];
    targetPos = dest.position.clone();
    targetPos.y = 2; // Keep pointer above ground

    document.getElementById("status-bar").innerText = `NAVIGATING TO: ${key} ZONE`;
    
    // Draw Path Line
    if (pathLine) scene.remove(pathLine);
    const points = [userPointer.position, targetPos];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const lineMat = new THREE.LineDashedMaterial({ color: 0x00ff88, dashSize: 1, gapSize: 0.5 });
    pathLine = new THREE.Line(lineGeo, lineMat);
    pathLine.computeLineDistances();
    scene.add(pathLine);
}

/**
 * ESP32 BLUETOOTH INTEGRATION
 */
async function connectESP32() {
    const status = document.getElementById("status-bar");
    try {
        status.innerText = "SCANNING FOR NHM BEACONS...";
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: "NHM_" }],
            optionalServices: ['battery_service'] 
        });

        const name = device.name.toUpperCase();
        status.innerText = `SYNCED WITH BEACON: ${name}`;

        if (name.includes("BLUE")) setDestination("BLUE");
        else if (name.includes("RED")) setDestination("RED");
        else if (name.includes("GREEN")) setDestination("GREEN");
        else if (name.includes("ORANGE")) setDestination("ORANGE");
        else setDestination("HUB");

    } catch (error) {
        status.innerText = "BLUETOOTH ERROR: PLEASE RETRY";
        console.error(error);
    }
}

/**
 * ANIMATION LOOP
 */
function animate() {
    requestAnimationFrame(animate);

    // Smooth movement (Lerp)
    userPointer.position.lerp(targetPos, 0.05);

    // Look at target
    const lookAtTarget = targetPos.clone();
    lookAtTarget.y = userPointer.position.y;
    userPointer.lookAt(lookAtTarget);

    // Camera follow
    const camTarget = new THREE.Vector3(
        userPointer.position.x,
        30,
        userPointer.position.z + 40
    );
    camera.position.lerp(camTarget, 0.03);
    camera.lookAt(userPointer.position);

    renderer.render(scene, camera);
}

animate();

// Handle Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
